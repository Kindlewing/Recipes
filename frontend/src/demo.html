<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script
			type="module"
			src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"
		></script>
		<title>Recipes Demo</title>
	</head>
	<body>
		<header>
			<h1>Recipes</h1>
		</header>
		<main>
			<!-- data-on-load triggers the SSE request as soon as this element loads -->
			<!-- Go merges the returned <article> fragments in here, matched by id -->
			<div id="recipe-list" data-on-load="@get('/recipes')"></div>
		</main>
	</body>
</html>
